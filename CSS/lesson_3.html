<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 3</title>
    <style>
        button {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .uber {
            background-color: black;
            color: white;
            padding: 10px 20px;
        }
        .uber:active {
            background-color: gray;
            color: white;
            padding: 10px 20px;
            border: none;
        }
        .Amazon {
            background-color: rgb(255, 216, 20);
            border: none;
            padding: 10px 40px;
            border-radius: 25px;
        }
        .Amazon:active {
            padding: 8px 35px;
            opacity: 0.8;
        }
        .Github {
            background-color: rgb(46, 164, 79);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            
        }
        .Github:active {
            opacity: 0.8;
        }
        .Bootstrap {
            background-color: rgb(121, 82, 179);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }
        .Bootstrap:active {
            background-color: rgb(78, 49, 122);
        }
        .Download {
            background-color: white;
            color: rgb(108, 117, 125);
            border-radius: 5px;
            padding: 10px 20px;
            border: 1px solid gray;
        }
        .Download:active {
            background-color: gray;
            color: white;
        }
        .LinkedIn {
            background-color: rgb(10, 102, 194);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
        }
        .LinkedIn:active {
            background-color: rgb(7, 58, 109);
            padding: 5px 20px
        }
        .Save {
            border-radius: 25px;
            padding: 10px 23px;
            color: rgb(10, 102, 194);
            border: 1px solid rgb(10, 102, 194);
            background-color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .Save:active {
        padding: 11px 24px;
        font-size: 17px;
        border: 2px solid rgb(7, 58, 109);
        }
    </style>
</head>
<body>
    <button class="uber">Request now</button>
    <button class="Amazon">Add to Cart</button>
    <button class="Github">Sign up</button>
    <button class="Bootstrap">Get started</button>
    <button class="Download">Download</button>
    <button class="LinkedIn">Apply on company website</button>
    <button class="Save">Save</button>
</body>
</html>
