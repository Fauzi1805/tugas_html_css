<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 8</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      font-size: 22px;
      margin-top: 30px;
    }

    /* Soal 8b */
    .text {
      width: 250px;
      display: inline-block;
      vertical-align: middle;
    }

    .Yes, .No {
      padding: 5px 10px;
      margin-left: 5px;
    }

    /* Soal 8c */
    .image4 {
      border-radius: 20px;
      padding: 10px;
      width: 200px;
      height: auto;
      display: block;
    }

    .input-search {
      padding: 10px;
      border: 1px solid gray;
      border-radius: 20px;
      width: 300px;
      margin-top: 10px;
    }

    /* Soal 8d */
    .input-small {
      width: 200px;
      padding: 10px;
      margin-bottom: 10px;
      display: block;
    }

    .input-full {
      width: 300px;
      padding: 10px;
      margin-bottom: 10px;
      display: block;
    }

    .signup-btn {
      width: 300px;
      padding: 10px;
      background-color: #4a7bdc;
      color: white;
      border: none;
    }

    /* Soal 8e */
    .uber-input {
      width: 300px;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      background-color: #eee;
      display: block;
    }

    .btn-black {
      background-color: black;
      color: white;
      padding: 10px;
      border: none;
      margin-right: 5px;
    }

    .btn-gray {
      background-color: #ddd;
      padding: 10px;
      border: none;
    }

  </style>
</head>

<body>

  <!-- Soal 8a -->
  <h1>8a</h1>
  <input type="text" placeholder="Name"><br><br>
  <input type="text" placeholder="Email">

  <!-- Soal 8b -->
  <h1>8b</h1>
  <span class="text">
    Thanks for chatting with our customer support.
    Would you like to take our quick survey?
  </span>
  <button class="Yes">Yes</button>
  <button class="No">No</button>

  <!-- Soal 8c -->
  <h1>8c</h1>
  <ul>
  <img class="image4" src="Screenshot 2026-06-27 214048.png" >
  </ul>
  <input type="text" class="input-search" placeholder="Search">

  <!-- Soal 8d -->
  <h1>8d</h1>
  <input type="text" placeholder="First name" class="input-small">
  <input type="text" placeholder="First name" class="input-small">
  <input type="text" placeholder="Email" class="input-full">
  <button class="signup-btn">Sign Up</button>

  <!-- Soal 8e -->
  <h1>8e</h1>
  <h2>Request a ride now</h2>
  <input type="text" placeholder="Enter pickup location" class="uber-input">
  <input type="text" placeholder="Enter destination" class="uber-input">
  <button class="btn-black">Request now</button>
  <button class="btn-gray">Schedule for later</button>
</body>
</html>
