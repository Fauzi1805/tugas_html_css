<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 2</title>
    <style>
        button {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .uber {
            background-color: black;
            color: white;
            padding: 10px 20px;
        }

        .uber::hover {
            color: red;
            padding: 5px 10px;
        }
        .Amazon {
            background-color: rgb(255, 216, 20);
            border: none;
            padding: 10px 40px;
            border-radius: 25px;
        }
        .Github {
            background-color: rgb(46, 164, 79);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }
        .Bootstrap {
            background-color: rgb(121, 82, 179);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }
        .Download {
            background-color: white;
            color: rgb(108, 117, 125);
            border-radius: 5px;
            padding: 10px 20px;
            border: 1px solid gray;
        }
        .LinkedIn {
            background-color: rgb(10, 102, 194);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
        }
        .LinkedIn:active {
            opacity: 0.5;
        }
        .Save {
            border-radius: 25px;
            padding: 10px 23px;
            color: rgb(10, 102, 194);
            border: 1px solid rgb(10, 102, 194);
            background-color: white;
            font-weight: bold;
        }
        .Save:active {
            color: gray;
            border: 1px solid red;
        }
        .Add {
            background-color: rgb(255, 216, 20);
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
        }
        .Add:active {
            color: #000;
            border: 1px solid  
        }
        .Buy {
            background-color: rgb(255, 164, 28);
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
        }
        .Buy:active {
            color: #000;
            border: 1px solid  
        }
    </style>
</head>
<body>
    <button class="uber">Request now</button>
    <button class="Amazon">Add to Cart</button>
    <button class="Github">Sign up</button>
    <button class="Bootstrap">Get started</button>
    <button class="Download">Download</button>
    <button class="LinkedIn">Apply on company website</button>
    <button class="Save">Save</button>
    <br>
    <a href="https://www.amazon.com/?&tag=googleglobalp-20&ref=pd_sl_7nnedyywlk_e&adgrpid=159651196451&hvpone=&hvptwo=&hvadid=675114638367&hvpos=&hvnetw=g&hvrand=15754168206664861925&hvqmt=e&hvdev=c&hvdvcmdl=&hvlocint=&hvlocphy=9056657&hvtargid=kwd-10573980&hydadcr=2246_13468515">Back to Amazon</a>
    <h3>Nike Black Running Shoes</h3>
    <p style="color: rgb(0, 118, 0)">$39 - in stock.</p>
    <p>Free delivery tommorow</p>
    <button class="Add">Add to Cart</button>
    <button class="Buy">Buy now</button>
</body>
</html>
