<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 11</title>
    <style>
        .grid-11a {
            display: grid;
            grid-template-columns: 200px 75px;
        }

        .col1 {
            background-color: lightblue;
        }

        .col2 {
            background-color: pink;
        }

        .grid-11b {
            display: grid;
            grid-template-columns: 50px 1fr 75px;
        }

        .coL1 {
            background-color: lightblue;
        }

        .coL2 {
            background-color: pink;
        }

        .coL3 {
            background-color: lightblue;
        }

        .grid-11c {
            display: grid;

            grid-template-columns:
                1fr 1fr 1fr 1fr;

            column-gap: 20px;

            row-gap: 10px;
        }

        .coL {
            background-color: pink;
        }

        .friends-grid {
            display: grid;

            grid-template-columns:
                200px 200px 200px;

            column-gap: 20px;
        }

        .card {
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
            padding-bottom: 10px;
            border-radius: 10px;
        }

        .profile-picture {
            width: 100%;
            height: 200px;
            object-fit: cover;
            text-align: center;
            align-items: center;
            justify-content: center;
            border-radius: 10px 10px 0 0;
        }

        .bottom {
            padding-left: 10px;
        }

        .mutual-row {
            display: grid;

            grid-template-columns:
                30px 1fr;

            align-items: center;
        }

        .mutual-picture {
            width: 28px;
            height: 28px;
            border-radius: 14px;
        }

        .add-friend-button {
            background-color: rgb(24, 119, 242);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h3>soal 11a</h3>
    <div class="grid-11a">
        <div class="col1">200px</div>
        <div class="col2">75px</div>
    </div>

    <h3>soal 11b</h3>
    <div class="grid-11b">
        <div class="coL1">col1</div>
        <div class="coL2">col2</div>
        <div class="coL3">col3</div>
    </div>

    <h3>soal 11c</h3>
    <div class="grid-11c">

        <div class="coL">col1</div>
        <div class="coL">col2</div>
        <div class="coL">col3</div>
        <div class="coL">col4</div>

        <div class="coL">col1</div>
        <div class="coL">col2</div>
        <div class="coL">col3</div>
        <div class="coL">col4</div>

    </div>

    <h3>soal 11d</h3>

    <div class="friends-grid">

        <div class="card">
            <img class="profile-picture" src="cat.png">

            <div class="bottom">
                <p class="name">Jihoon</p>

                <div class="mutual-row">

                    <img class="mutual-picture" src="rusa.png">

                    <p class="mutual-friends">
                        5 mutual friends
                    </p>

                </div>

                <button class="add-friend-button">
                    Add Friend
                </button>
            </div>

        </div>

        <div class="friends-grid">

            <div class="card">
                <img class="profile-picture" src="cat2.png">
                <div class="bottom">
                    <p class="name">Shinyu</p>

                    <div class="mutual-row">

                        <img class="mutual-picture" src="rusa.png">

                        <p class="mutual-friends">
                            5 mutual friends
                        </p>

                    </div>

                    <button class="add-friend-button">
                        Add Friend
                    </button>
                </div>

            </div>

            <div class="friends-grid">

                <div class="card">
                    <img class="profile-picture" src="dog.png">
                    <div class="bottom">
                        <p class="name">Youngjae</p>

                        <div class="mutual-row">

                            <img class="mutual-picture" src="rusa.png">

                            <p class="mutual-friends">
                                5 mutual friends
                            </p>

                        </div>

                        <button class="add-friend-button">
                            Add Friend
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
